<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Наша история</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            /* Обновленный темный фон: глубокий ночной градиент */
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Основной цвет текста теперь светлый */
            color: #e0e6ed;
            overflow: hidden;
            position: relative;
        }

        /* Задний фон с падающими сердечками */
        .hearts-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .card {
            /* Темная карточка с эффектом стекла */
            background: rgba(22, 33, 62, 0.75);
            backdrop-filter: blur(15px);
            padding: 2.5rem;
            border-radius: 24px;
            /* Тень стала более глубокой, розовое свечение приглушено */
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            text-align: center;
            max-width: 90%;
            width: 450px;
            z-index: 2;
            /* Граница карточки темная, едва заметная */
            border: 1px solid rgba(255, 255, 255, 0.08);
            animation: fadeIn 1.2s ease-out;
        }

        h1 {
            font-size: 2rem;
            /* Текст заголовка яркий, неоново-розовый */
            color: #ff758f;
            margin-bottom: 0.5rem;
            font-weight: 600;
            text-shadow: 0 0 10px rgba(255, 117, 143, 0.5);
        }

        .subtitle {
            font-size: 1.1rem;
            /* Подзаголовок мягкого фиолетового цвета */
            color: #a78bfa;
            margin-bottom: 2rem;
            font-style: italic;
        }

        .timer-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 2rem;
        }

        .timer-box {
            /* Внутренние блоки темнее карточки */
            background: rgba(15, 23, 42, 0.8);
            padding: 18px;
            border-radius: 16px;
            /* Едва заметная розовая обводка */
            border: 1px solid rgba(255, 117, 143, 0.15);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .timer-box:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 117, 143, 0.4);
        }

        .number {
            font-size: 2.5rem; /* Немного увеличил цифры */
            font-weight: 700;
            /* Яркий акцентный цвет для цифр */
            color: #ff758f;
            line-height: 1;
            margin-bottom: 5px;
            text-shadow: 0 0 15px rgba(255, 117, 143, 0.7);
        }

        .label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            /* Текст подписей приглушенный серо-голубой */
            color: #94a3b8;
        }

        .heart-icon {
            font-size: 3rem;
            /* Центральное сердце тоже яркое */
            color: #ff758f;
            animation: heartbeat 1.4s infinite;
            margin-top: 1rem;
            display: inline-block;
            filter: drop-shadow(0 0 10px rgba(255, 117, 143, 0.8));
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes heartbeat {
            0% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(255, 117, 143, 0.8))}
            20% { transform: scale(1.12); filter: drop-shadow(0 0 15px rgba(255, 117, 143,1 ))}
            40% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(255, 117, 143, 0.8)); }
            60% { transform: scale(1.12); filter: drop-shadow(0 0 15px rgba(255, 117, 143, 1)); }
            100% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(255, 117, 143, 0.8)); }
        }
    </style>
</head>
<body>

    <div class="hearts-bg" id="hearts"></div>

    <div class="card">
        <h1>Настюлик, Мы вместе с тобой уже</h1>
        <div class="subtitle">И с каждым днем я люблю тебя все сильнее</div>

        <div class="timer-container">
            <div class="timer-box">
                <div class="number" id="days">00</div>
                <div class="label">Дней</div>
            </div>
            <div class="timer-box">
                <div class="number" id="hours">00</div>
                <div class="label">Часов</div>
            </div>
            <div class="timer-box">
                <div class="number" id="minutes">00</div>
                <div class="label">Минут</div>
            </div>
            <div class="timer-box">
                <div class="number" id="seconds">00</div>
                <div class="label">Секунд</div>
            </div>
        </div>

        <div class="heart-icon">❤️</div>
    </div>

    <script>
        // Дата: 5 июля 2024 года, 20:13:00
        const startDate = new Date(2024, 6, 5, 20, 13, 0); 

        function updateTimer() {
            const now = new Date();
            const difference = now - startDate;

            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            document.getElementById('days').innerText = days;
            document.getElementById('hours').innerText = hours.toString().padStart(2, '0');
            document.getElementById('minutes').innerText = minutes.toString().padStart(2, '0');
            document.getElementById('seconds').innerText = seconds.toString().padStart(2, '0');
        }

        updateTimer();
        setInterval(updateTimer, 1000);

        // Генератор падающих сердечек на фоне (в темной теме они чуть прозрачнее)
        function createHeart() {
            const heart = document.createElement('div');
            heart.style.position = 'absolute';
            heart.innerText = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = '-20px';
            heart.style.fontSize = Math.random() * 15 + 12 + 'px';
            // Сердечки стали чуть более тусклыми, чтобы не отвлекать
            heart.style.opacity = Math.random() * 0.3 + 0.1;
            heart.style.transform = `rotate(${Math.random() * 360}deg)`;
            heart.style.transition = 'transform 4s linear, top 4s linear';
            
            document.getElementById('hearts').appendChild(heart);

            setTimeout(() => {
                heart.style.top = '105vh';
                heart.style.transform = `rotate(${Math.random() * 360}deg) translateX(30px)`;
            }, 50);

            setTimeout(() => {
                heart.remove();
            }, 4000);
        }

        setInterval(createHeart, 450); // Чуть реже падают
    </script>
</body>
</html>
